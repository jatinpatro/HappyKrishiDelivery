name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'HappyKrishiDelivery/happykrishi_backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/happykrishi
            git pull origin main
            cd HappyKrishiDelivery/happykrishi_backend
            npm ci --production
            pm2 restart happykrishi-api || pm2 start app.js --name happykrishi-api
            pm2 save
            echo "Deploy complete at $(date)"
