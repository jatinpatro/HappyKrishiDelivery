name: Deploy Web Admin to EC2

on:
  push:
    branches: [main]
    paths:
      - 'HappyKrishiDelivery/happykrishi_web_admin/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HappyKrishiDelivery/happykrishi_web_admin/package-lock.json

      - name: Install and build
        working-directory: HappyKrishiDelivery/happykrishi_web_admin
        run: |
          npm ci
          npm run build

      - name: Deploy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'HappyKrishiDelivery/happykrishi_web_admin/dist/*'
          target: '/var/www/happykrishi-admin'
          strip_components: 4
