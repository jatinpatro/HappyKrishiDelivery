name: happykrishi_delivery
description: HappyKrishi Farm Delivery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^12.0.0

  # Real-time
  web_socket_channel: ^3.0.1

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # UI utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  badges: ^3.1.2
  google_fonts: ^6.2.1

  # PDF generation & sharing
  pdf: ^3.11.1
  printing: ^5.13.2

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.8
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_auth: ^6.5.4
  flutter_contacts: ^2.2.2
  firebase_storage: ^13.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.2
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/logo.png
  image_path: assets/images/logo.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  color_dark: "#1B5E20"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/splash_logo.png
    color_dark: "#1B5E20"
    image_dark: assets/images/splash_logo.png
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
