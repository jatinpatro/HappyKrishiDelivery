  <!-- Firebase Storage upload via REST — non-module so window.X is accessible immediately -->
  <script>
    window.uploadToFirebaseStorage = function(base64Data, filename, contentType) {
      return new Promise(function(resolve) {
        try {
          const binary = atob(base64Data);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          const blob = new Blob([bytes], { type: contentType });
          const encodedName = encodeURIComponent(filename);
          const url = 'https://firebasestorage.googleapis.com/v0/b/happykrishidelivery.firebasestorage.app/o?name=' + encodedName + '&uploadType=media';

          const xhr = new XMLHttpRequest();
          xhr.open('POST', url, true);
          xhr.setRequestHeader('Content-Type', contentType);
          xhr.onload = function() {
            if (xhr.status === 200) {
              const data = JSON.parse(xhr.responseText);
              const downloadUrl = 'https://firebasestorage.googleapis.com/v0/b/happykrishidelivery.firebasestorage.app/o/' + encodedName + '?alt=media&token=' + data.downloadTokens;
              resolve(JSON.stringify({ success: true, url: downloadUrl }));
            } else {
              resolve(JSON.stringify({ success: false, message: 'Upload failed: ' + xhr.status + ' ' + xhr.responseText }));
            }
          };
          xhr.onerror = function() {
            resolve(JSON.stringify({ success: false, message: 'Network error during upload' }));
          };
          xhr.send(blob);
        } catch (e) {
          resolve(JSON.stringify({ success: false, message: e.toString() }));
        }
      });
    };
  </script>
